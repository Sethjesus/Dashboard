<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>設備能耗趨勢圖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
<style>
  :root {
    --bg:#f9fbfd; --card:#fff; --muted:#6b7280; --text:#1f2937; --accent:#2563eb; --soft:#eef2f7;
  }
  body { font-family:"Microsoft JhengHei",Arial,sans-serif; margin:0; background:var(--bg); color:var(--text); }
  .container { margin:20px; padding:16px; }
  .controls, .summary, #chart { background:#fff; border:1px solid #e5e7eb; border-radius:14px; box-shadow:0 6px 18px rgba(0,0,0,.05); }
  .controls { padding:16px; }
  .grid-container { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; margin-top:12px; }
  .grid-item { background:linear-gradient(180deg,#fff,#f8fafc); border:1px solid #e5e7eb; border-radius:12px; padding:12px; }
  .dev-header { display:flex; align-items:center; gap:8px; font-weight:600; }
  .badge { display:inline-block; padding:2px 8px; border-radius:999px; background:#f1f5f9; border:1px solid #e2e8f0; font-size:12px; color:#334155; }
  .mini { font-size:12px; color:var(--muted); margin-top:6px; }
  .row { display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .row input[type="number"] { width:110px; padding:6px 8px; }
  .row input[type="range"] { flex:1; min-width:120px; }
  .btn-link { font-size:12px; color:var(--accent); cursor:pointer; text-decoration:underline; }
  #chart { height:540px; margin-top:16px; }
  .summary { margin-top:16px; padding:12px; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { border-bottom:1px solid #e5e7eb; padding:8px 10px; text-align:left; }
  th { background:var(--soft); }
</style>
</head>

  const defaultChecked = {};

  const thresholdContainer = document.getElementById("threshold-container");
  const chartDiv = document.getElementById("chart");
  const summaryBody = document.getElementById("summary-body");
  const colors = ['#FF5733','#33B5A5','#5733FF','#FFD700','#FF33A1','#A133FF','#33A1FF','#FF8C33','#33FFA1','#A1FF33','#1D4ED8','#0D9488'];

  function stats(arr) {
    if (!arr || !arr.length) return {avg:0,max:0,latest:0};
    const ys = arr.map(d => Number(d["能耗 (kWh)"]) || 0);
    const sum = ys.reduce((a,b)=>a+b,0);
    return {avg: sum/ys.length, max: Math.max(...ys), latest: ys[ys.length-1] ?? 0};
  }

  // 建立每台設備的控制項（注意 ${...}：在 f-string 中用雙大括號保留 JS 模板變數）
  for (const dev in devices) {
    const s = stats(devices[dev]);
    const preset = Object.prototype.hasOwnProperty.call(defaultChecked, dev)
      ? defaultChecked[dev]
      : Math.round((s.max || 100) * 1.1 * 10) / 10; // 最高值+10%

    const item = document.createElement("div");
    item.className = "grid-item";
    item.innerHTML = `
      <div class="dev-header">
        <input type="checkbox" id="toggle-${dev}" ${Object.prototype.hasOwnProperty.call(defaultChecked, dev)?'checked':''} />
        <label for="toggle-${dev}">${dev}</label>
        <span class="badge">歷史 平均：${s.avg.toFixed(2)} ｜ 最高：${s.max.toFixed(2)}</span>
      </div>
      <div class="mini">勾選後會顯示「曾經最高值／平均值」，並可一鍵「設為最高值+10%」。</div>
      <div class="row">
        <input type="number" id="threshold-${dev}" value="${preset}" min="0" step="0.1" oninput="syncSlider('${dev}')" />
        <input type="range"  id="slider-${dev}"    value="${preset}" min="0" step="0.1" oninput="syncNumber('${dev}')" />
        <span class="btn-link" onclick="setPlus10('${dev}')">設為最高值+10%</span>
      </div>
      <div class="mini" id="hint-${dev}"></div>
    `;
    thresholdContainer.appendChild(item);
  }

  function setPlus10(dev) {
    const s = stats(devices[dev]);
    const v = Math.round(s.max * 1.1 * 10) / 10;
    document.getElementById("threshold-"+dev).value = v;
    document.getElementById("slider-"+dev).value = v;
    updateChart();
  }
  function syncSlider(dev) {
    document.getElementById("slider-"+dev).value = document.getElementById("threshold-"+dev).value;
    updateChart();
  }
  function syncNumber(dev) {
    document.getElementById("threshold-"+dev).value = document.getElementById("slider-"+dev).value;
    updateChart();
  }

  function updateChart() {
    const traces = [];
    let colorIndex = 0;
    summaryBody.innerHTML = "";

    for (const dev in devices) {
      const chk = document.getElementById("toggle-"+dev);
      const thrEl = document.getElementById("threshold-"+dev);
      const hint = document.getElementById("hint-"+dev);
      const series = devices[dev];
      const s = stats(series);
      const thr = thrEl ? parseFloat(thrEl.value) : NaN;

      if (chk && chk.checked) {
        hint.textContent = `曾經最高值：${s.max.toFixed(2)} kWh；平均值：${s.avg.toFixed(2)} kWh`;

        traces.push({
          x: series.map(d=>d["日期"]),
          y: series.map(d=>d["能耗 (kWh)"]),
          mode: 'lines',
          name: dev,
          line: { color: colors[colorIndex%colors.length], width: 3, shape:'spline' }
        });
        traces.push({
          x: series.map(d=>d["日期"]),
          y: Array(series.length).fill(thr),
          mode: 'lines',
          name: dev + ' 警戒線',
          line: { color: colors[colorIndex%colors.length], dash:'dot', width: 2 }
        });

        const status = (s.latest > thr) ? "⚠️ 超過警戒" : "✅ 正常";
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${dev}</td>
          <td>${s.avg.toFixed(2)}</td>
          <td>${s.max.toFixed(2)}</td>
          <td>${s.latest.toFixed(2)}</td>
          <td>${isNaN(thr)?'-':thr.toFixed(2)}</td>
          <td>${status}</td>
        `;
        summaryBody.appendChild(tr);

        colorIndex++;
      } else {
        hint.textContent = "";
      }
    }

    Plotly.newPlot(chartDiv, traces, {
      title: '📈 每日設備能耗趨勢圖 (kWh)',
      xaxis: { title:'📅 日期', tickangle:-45 },
      yaxis: { title:'🔋 用電量 (kWh)' },
      paper_bgcolor: '#fff',
      plot_bgcolor: '#f8fafc',
      font: { family:'Microsoft JhengHei, Arial', size:14, color:'#374151' },
      legend: { orientation: 'h' }
    });
  }

  thresholdContainer.addEventListener('change', (e) => {
    if (e.target && e.target.type === 'checkbox') updateChart();
  });
  updateChart();
</script>
