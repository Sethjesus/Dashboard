<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<title>設備能耗趨勢圖</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
  :root {
    --bg: #f9fbfd;
    --card: #ffffff;
    --muted: #6b7280;
    --text: #1f2937;
    --accent: #2563eb;
    --soft: #eef2f7;
    --danger: #dc2626;
    --ok: #16a34a;
    --warning-bg: #fff1f2;
    --warning-border: #fecdd3;
  }

  body {
    font-family: "Microsoft JhengHei", Arial, sans-serif;
    margin: 0;
    background: var(--bg);
    color: var(--text);
  }

  .container {
    margin: 20px;
    padding: 16px;
  }

  h2 {
    margin-bottom: 6px;
  }

  h4 {
    margin-top: 6px;
    color: #374151;
  }

  .controls,
  .summary,
  .alert-panel,
  #chart {
    background: var(--card);
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0, 0, 0, .05);
  }

  .controls {
    padding: 16px;
  }

  .toolbar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 12px;
    align-items: center;
  }

  .toolbar button {
    border: 1px solid #d1d5db;
    background: #ffffff;
    border-radius: 8px;
    padding: 7px 12px;
    cursor: pointer;
    font-size: 14px;
  }

  .toolbar button:hover {
    background: #f3f4f6;
  }

  .toolbar .hint {
    color: var(--muted);
    font-size: 13px;
  }

  .grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 14px;
    margin-top: 12px;
  }

  .grid-item {
    background: linear-gradient(180deg, #ffffff, #f8fafc);
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    padding: 12px;
  }

  .dev-header {
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 600;
    line-height: 1.4;
  }

  .dev-header label {
    cursor: pointer;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    font-size: 12px;
    color: #334155;
    margin-left: auto;
    white-space: nowrap;
  }

  .mini {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .row input[type="number"] {
    width: 110px;
    padding: 6px 8px;
    border: 1px solid #d1d5db;
    border-radius: 7px;
  }

  .row input[type="range"] {
    flex: 1;
    min-width: 120px;
  }

  .btn-link {
    font-size: 12px;
    color: var(--accent);
    cursor: pointer;
    text-decoration: underline;
  }

  #chart {
    height: 560px;
    margin-top: 16px;
  }

  .alert-panel {
    margin-top: 16px;
    padding: 12px;
    display: none;
    background: var(--warning-bg);
    border-color: var(--warning-border);
  }

  .alert-panel h4 {
    color: var(--danger);
    margin: 0 0 8px 0;
  }

  .alert-item {
    color: var(--danger);
    font-weight: 600;
    margin: 6px 0;
    line-height: 1.5;
  }

  .summary {
    margin-top: 16px;
    padding: 12px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    min-width: 760px;
  }

  th,
  td {
    border-bottom: 1px solid #e5e7eb;
    padding: 8px 10px;
    text-align: left;
  }

  th {
    background: var(--soft);
    white-space: nowrap;
  }

  .status-ok {
    color: var(--ok);
    font-weight: bold;
  }

  .status-alert {
    color: var(--danger);
    font-weight: bold;
  }

  .empty-note {
    color: var(--muted);
    padding: 12px 0;
  }
</style>
</head>

<body>
  <div class="container">
    <h2>📊 設備能耗趨勢圖</h2>
    <h4>🛠 勾選設備並設定警戒閾值（設備異常 / 老化警戒）</h4>

    <div class="controls">

      <div id="threshold-container" class="grid-container"></div>
    </div>

    <div id="chart"></div>

    <div id="alert-panel" class="alert-panel">

            <th>狀態</th>

        </thead>
        <tbody id="summary-body"></tbody>
      </table>
    </div>
  </div>

  function safeId(index) {
    return "dev_" + index;
  }

  function valuesOf(device) {
    return devices[device].map(d => Number(d["能耗 (kWh)"]) || 0);
  }

  function avg(arr) {
    if (!arr.length) return 0;
    return arr.reduce((a, b) => a + b, 0) / arr.length;
  }

  function max(arr) {
    if (!arr.length) return 0;
    return Math.max(...arr);
  }

  function latest(arr) {
    if (!arr.length) return 0;
    return arr[arr.length - 1];
  }

  function suggestThreshold(device) {
    const arr = valuesOf(device).filter(v => v > 0);
    if (!arr.length) return 1200;

    const average = avg(arr);
    const maximum = max(arr);

    let suggested = average + (maximum - average) * 0.65;
    suggested = Math.ceil(suggested);

    return suggested;
  }

  function createDeviceCards() {
    thresholdContainer.innerHTML = "";

    if (!deviceNames.length) {

      return;
    }

    deviceNames.forEach((device, index) => {
      const id = safeId(index);
      const arr = valuesOf(device);
      const suggested = suggestThreshold(device);

      const card = document.createElement("div");
      card.className = "grid-item";

      card.innerHTML = `
        <div class="dev-header">
          <input type="checkbox" id="toggle-${id}" data-index="${index}">
          <label for="toggle-${id}">${device}</label>
          <span class="badge">${arr.length} 筆</span>

        </div>

        <div class="row">
          <input type="range" id="slider-${id}" value="${Math.min(suggested, 2000)}" min="0" max="2000" step="1">
        </div>

          <span class="btn-link" onclick="setAverageThreshold(${index})">用平均值</span>
          <span class="btn-link" onclick="setMaxThreshold(${index})">用最高值</span>
          <span class="btn-link" onclick="setSuggestedThreshold(${index})">建議值</span>
        </div>
      `;

      thresholdContainer.appendChild(card);

      const checkbox = document.getElementById("toggle-" + id);
      const numberInput = document.getElementById("threshold-" + id);
      const sliderInput = document.getElementById("slider-" + id);

      checkbox.addEventListener("change", updateAll);

      numberInput.addEventListener("input", function () {
        sliderInput.value = Math.min(Number(this.value) || 0, 2000);
        updateAll();
      });

      sliderInput.addEventListener("input", function () {
        numberInput.value = this.value;
        updateAll();
      });
    });

    // 預設一打開就選「歷史最高能耗較高的 5 台」
    selectTopDevices();
  }

  }

  function setThreshold(index, value) {
    const id = safeId(index);
    const numberInput = document.getElementById("threshold-" + id);
    const sliderInput = document.getElementById("slider-" + id);

    numberInput.value = Math.ceil(value);
    sliderInput.value = Math.min(Math.ceil(value), 2000);

    updateAll();
  }

  function setAverageThreshold(index) {
    const device = deviceNames[index];
    const arr = valuesOf(device).filter(v => v > 0);
    setThreshold(index, avg(arr));
  }

  function setMaxThreshold(index) {
    const device = deviceNames[index];
    const arr = valuesOf(device).filter(v => v > 0);
    setThreshold(index, max(arr));
  }

  function setSuggestedThreshold(index) {
    const device = deviceNames[index];
    setThreshold(index, suggestThreshold(device));
  }

  function selectedIndexes() {
    return deviceNames
      .map((_, index) => index)
      .filter(index => {
        const checkbox = document.getElementById("toggle-" + safeId(index));
        return checkbox && checkbox.checked;
      });
  }

  function selectAllDevices() {
    deviceNames.forEach((_, index) => {
      document.getElementById("toggle-" + safeId(index)).checked = true;
    });
    updateAll();
  }

  function clearAllDevices() {
    deviceNames.forEach((_, index) => {
      document.getElementById("toggle-" + safeId(index)).checked = false;
    });
    updateAll();
  }

  function selectTopDevices() {
    // 依照每台設備的「歷史最高能耗」排序，選出最高的 5 台
    const topFiveIndexes = deviceNames
      .map((device, index) => {
        const arr = valuesOf(device);
        return {
          index: index,
          maxValue: max(arr)
        };
      })
      .sort((a, b) => b.maxValue - a.maxValue)
      .slice(0, 5)
      .map(item => item.index);

    deviceNames.forEach((_, index) => {
      document.getElementById("toggle-" + safeId(index)).checked =
        topFiveIndexes.includes(index);
    });

    updateAll();
  }

  function updateChart() {
    let traces = [];
    const selected = selectedIndexes();

    selected.forEach((index, colorIndex) => {
      const device = deviceNames[index];
      const deviceData = devices[device];
      const threshold = getThreshold(index);
      const color = colors[colorIndex % colors.length];

      traces.push({
        x: deviceData.map(d => d["日期"]),
        y: deviceData.map(d => Number(d["能耗 (kWh)"]) || 0),
        mode: "lines+markers",
        name: device,
        line: {
          color: color,
          width: 3,
          shape: "spline"
        },
        marker: {
          size: 5
        }
      });

      traces.push({
        x: deviceData.map(d => d["日期"]),
        y: Array(deviceData.length).fill(threshold),
        mode: "lines",
        name: device + " 警戒線",
        line: {
          color: color,
          dash: "dot",
          width: 2
        }
      });

      const exceedPoints = deviceData.filter(d => {
        return (Number(d["能耗 (kWh)"]) || 0) > threshold;
      });

      if (exceedPoints.length > 0) {
        traces.push({
          x: exceedPoints.map(d => d["日期"]),
          y: exceedPoints.map(d => Number(d["能耗 (kWh)"]) || 0),
          mode: "markers",
          name: device + " 超標點",
          marker: {
            color: color,
            size: 11,
            symbol: "x"
          }
        });
      }
    });

    if (selected.length === 0) {
      Plotly.newPlot(chartDiv, [], {
        ...layout,
        title: "📈 請先勾選設備"
      }, config);
    } else {
      Plotly.newPlot(chartDiv, traces, layout, config);
    }
  }

  function updateSummary() {
    const selected = selectedIndexes();
    summaryBody.innerHTML = "";

    if (selected.length === 0) {
      summaryBody.innerHTML = `
        <tr>
          <td colspan="7" class="empty-note">尚未勾選設備。</td>
        </tr>
      `;
      return;
    }

    selected.forEach(index => {
      const device = deviceNames[index];
      const arr = valuesOf(device);
      const threshold = getThreshold(index);
      const exceedCount = arr.filter(v => v > threshold).length;
      const currentLatest = latest(arr);

      const status = exceedCount > 0
        ? `<span class="status-alert">異常 / 超標</span>`
        : `<span class="status-ok">正常</span>`;

      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${device}</td>
        <td>${avg(arr).toFixed(3)}</td>
        <td>${max(arr).toFixed(3)}</td>
        <td>${currentLatest.toFixed(3)}</td>
        <td>${threshold.toFixed(0)}</td>
        <td>${exceedCount}</td>
        <td>${status}</td>
      `;

      summaryBody.appendChild(row);
    });
  }

  function updateAlerts() {
    const selected = selectedIndexes();
    alertBody.innerHTML = "";

    let messages = [];

    selected.forEach(index => {
      const device = deviceNames[index];
      const deviceData = devices[device];
      const threshold = getThreshold(index);

      const exceedItems = deviceData
        .filter(d => (Number(d["能耗 (kWh)"]) || 0) > threshold)
        .map(d => `${d["日期"]}：${Number(d["能耗 (kWh)"]).toFixed(3)} kWh`);

      if (exceedItems.length > 0) {
        messages.push(`
          <div class="alert-item">
            ⚠️ ${device} 超過警戒值 ${threshold} kWh。<br>
            超標日期：${exceedItems.join("、")}
          </div>
        `);
      }
    });

    if (messages.length > 0) {
      alertPanel.style.display = "block";
      alertBody.innerHTML = messages.join("");
    } else {
      alertPanel.style.display = "none";
      alertBody.innerHTML = "";
    }
  }

  function updateAll() {
    updateChart();
    updateSummary();
    updateAlerts();
  }

  createDeviceCards();
</script>
</body>
</html>
